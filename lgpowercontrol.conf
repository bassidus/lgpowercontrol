# After editing this file, restart the monitor service to apply changes:
#   sudo systemctl restart lgpowercontrol-monitor.service

# Your LG TV's IP address on the local network.
# Tip: Set a static IP (or DHCP reservation in your router) so this never changes.
# Where to find it: router device list, or TV menu → Network → Network Status.
LGTV_IP="192.168.1.142"

# Your LG TV's MAC address — used to wake the TV over the network.
# Where to find it: router device list, TV menu → Network → Network Status,
# or run "ip neigh show 192.168.1.142" on this machine while the TV is on.
# Format: six hex pairs separated by colons, e.g. "20:28:bc:e6:3d:f6".
LGTV_MAC="20:28:bc:e6:3d:f6"

# HDMI input to switch to when turning the TV on (e.g. "HDMI_1", "HDMI_2").
# Leave empty or comment out to keep the current input unchanged.
HDMI_INPUT=

# BOOT_SHUTDOWN_MODE: How the TV should behave when this machine boots or shuts down.
#
# Options:
#   power  - Full power off. Maximum energy savings, but the TV takes a few
#            seconds to wake up again.
#   screen - Screen off only. Wakes instantly, but uses slightly more power
#            while the machine is off.
BOOT_SHUTDOWN_MODE="power"

# MONITOR_MODE: How the TV should behave when the monitor signal changes
# (e.g. display sleeps or wakes).
#
# Same options as BOOT_SHUTDOWN_MODE.
MONITOR_MODE="screen"

# bscpylgtv command and its state database.
BIN=(/opt/lgpowercontrol/bscpylgtv/bin/bscpylgtvcommand -p /opt/lgpowercontrol/.aiopylgtv.sqlite "$LGTV_IP")

# Wake-on-LAN command.
WOL_CMD=(/usr/bin/wakeonlan -i "$LGTV_IP" "$LGTV_MAC")