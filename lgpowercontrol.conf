# Required settings:
LGTV_IP="192.168.1.142"             # Your TV's IP address
LGTV_MAC=""                         # Your TV's MAC address. Leave empty to let the
                                    # installer auto-detect it (TV must be on).

# Optional settings:
HDMI_INPUT=""                       # HDMI input to switch to when turning on the TV. 
                                    # Format: "HDMI_1", "HDMI_2", etc. Leave empty to keep the current input unchanged.

OFF_WARNING_SECONDS="60"            # Show a desktop notification this many seconds before the screen (and TV) turns off.
                                    # Set to 0 to disable. Requires KDE Plasma with "Dim automatically" enabled in
                                    # System Settings -> Energy Saving; the warning is timed from the dim event.

NOTIFY_POLL_SECONDS="2"             # How often the notify service checks whether Plasma has dimmed the screen.
                                    # Lower value  = snappier: the warning appears closer to the exact time and is
                                    #                dismissed almost immediately when you return, but polls more
                                    #                often (each check costs ~15 ms CPU).
                                    # Higher value = near-zero overhead, but the warning can appear and linger up
                                    #                to this many seconds late.
                                    # 1 = snappiest (~1.5% of one core), 2 = good balance, 5 = minimal overhead.

BOOT_SHUTDOWN_MODE="power"          # power  - Full power off. Maximum energy savings, but the TV takes a few seconds to wake up again.
MONITOR_MODE="screen"               # screen - Screen off only. Wakes instantly, but uses slightly more power while the machine is off.

# After editing this file, restart the services to apply changes:
# sudo systemctl restart lgpowercontrol-monitor.service
# systemctl --user restart lgpowercontrol-notify.service

# Set a static IP (or DHCP reservation in your router) so this never changes.

# Where to find the IP address: router device list, or TV menu → Network → Network Status.

# Where to find the MAC address: run "ip neigh show 192.168.1.XXX" 