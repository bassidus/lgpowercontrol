# Required settings:
LGTV_IP=""                          # Your TV's IP address e.g. "192.168.1.100". Find it in your router's
                                    # device list or on the TV under Network -> Network Status. Give the TV
                                    # a static IP (or DHCP reservation in your router) so it never changes.

# Optional settings:
LGTV_MAC=""                         # Your TV's MAC address. Normally auto-detected by the
                                    # installer (TV must be on). Set it manually only if
                                    # detection fails.

WOL_L3="no"                         # "yes" sends the wake packet routed directly to LGTV_IP (port 9)
                                    # instead of as a broadcast. Needed when the TV is on a different
                                    # subnet/VLAN than this machine, since broadcasts don't cross subnets.
                                    # Leave "no" when the TV is on the same network - broadcast is more
                                    # reliable there.

HDMI_INPUT=""                       # HDMI input to switch to when turning on the TV.
                                    # Format: "HDMI_1", "HDMI_2", etc. Leave empty to keep the current input unchanged.

OFF_WARNING_SECONDS="120"           # Show a desktop notification this many seconds before the screen (and TV) turns off.
                                    # Set to 0 to disable. Requires KDE Plasma with "Dim automatically" enabled in
                                    # System Settings -> Power Management; the warning is timed from the dim event.

NOTIFY_POLL_SECONDS="2"             # How often the notify service checks whether Plasma has dimmed the screen.
                                    # Lower value  = snappier: the warning appears closer to the exact time and is
                                    #                dismissed almost immediately when you return, but polls more
                                    #                often (each check costs ~15 ms CPU).
                                    # Higher value = near-zero overhead, but the warning can appear and linger up
                                    #                to this many seconds late.
                                    # 1 = snappiest (~1.5% of one core), 2 = good balance, 5 = minimal overhead.

UPDATE_CHECK_DAYS="7"               # Check GitHub for a new LGPowerControl version at most once per this many
                                    # days and show a desktop notification when one is available. The
                                    # notification repeats at the same interval until you update. Nothing is
                                    # ever installed automatically. Set to 0 to disable the check.

UPDATE_CHANNEL="main"               # Which updates to check for: "main" (stable releases) or "dev"
                                    # (latest dev-branch commit — notifies on every new commit).

LOGGING="yes"                       # Log activity to the system journal ("yes" or "no").
                                    # View the log with: journalctl -t lgpowercontrol

# If the services are already running, restart them after editing this file:
# sudo systemctl restart lgpowercontrol-monitor.service
# systemctl --user restart lgpowercontrol-notify.service
